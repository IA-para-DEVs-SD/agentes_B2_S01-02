version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: agentes_postgres
    environment:
      POSTGRES_DB: suporte_ai
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d suporte_ai"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: agentes_app
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: true

  qdrant:
    image: qdrant/qdrant:latest
    container_name: agentes_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  pgadmin:
    image: dpage/pgadmin4
    container_name: agentes_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

volumes:
  postgres_data:
  qdrant_data:
